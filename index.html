<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>令和8年度E3B１班の課題研究</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #764ba2;
            font-size: 1.3em;
            font-weight: 600;
        }
        
        section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        h2 {
            color: #667eea;
            border-bottom: 3px solid #764ba2;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.8em;
        }
        
        p {
            font-size: 1.1em;
            color: #555;
            line-height: 1.8;
        }
        
        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>令和8年度E3B１班の課題研究</h1>
            <p class="subtitle">Bluetoothを使った自動資料読込み機</p>
        </header>
        
        <section>
            <h2>課題研究テーマ</h2>
            <p>Bluetoothを使った自動資料読込み機</p>
        </section>
        
        <section>
            <h2>6月12日までの研究の進捗</h2>
            <p>Arduino UNO R4 本体とPCとを接続し、Wi-Fi連携機能を使ってスマートフォンからの遠隔操作をできるようにした。</p>
        </section>
        
        <section>
            <h2>現段階での課題点</h2>
            <p>Arduino UNO R4 とブレッドボードを接続し、スマートフォンから遠隔でブレッドボードのLEDを光らせる</p>
        </section>
        
        <footer>
            <p>&copy; 2026 E3B１班 課題研究 - Arduino Project</p>
        </footer>
    </div>
</body>
</html>
